# nginx.conf
events {}

http {
    server {
        listen 80;

        server_name *.switchfy.ma;

        location / {
            # extract subdomain
            if ($host ~* ^(.+)\.switchfy\.ma$) {
                set $subdomain $1;
            }

            # rewrite to /subdomain
            rewrite ^/$ /$subdomain break;

            proxy_pass http://app:5000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}