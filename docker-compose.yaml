version: '3.9'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: switchfy-nginx
    restart: unless-stopped
    ports:
      - 3007:80 # ← expose, NOT ports (let Traefik handle routing)
    networks:
      - switchfy-net
      - coolify # ← MUST be on coolify network for Traefik to reach it
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.services.switchfy-fallback.loadbalancer.server.port=80'

      # Catchall for *.switchfy.ma — lowest priority
      - 'traefik.http.routers.switchfy-catchall.rule=HostSNI(`*`)'
      - 'traefik.http.routers.switchfy-catchall.priority=1'
      - 'traefik.http.routers.switchfy-catchall.entrypoints=https'
      - 'traefik.http.routers.switchfy-catchall.tls=true'
      - 'traefik.http.routers.switchfy-catchall.service=switchfy-fallback'

networks:
  switchfy-net:
    driver: bridge
  coolify:
    external: true # ← reference Coolify's existing network
