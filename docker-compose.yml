version: '3.9'

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: switchfy-app
    restart: unless-stopped
    expose:
      - '5000'
    networks:
      - switchfy-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: switchfy-nginx
    restart: unless-stopped
    ports:
      - '3050:80'
    depends_on:
      - app
    networks:
      - switchfy-net

networks:
  switchfy-net:
    driver: bridge
