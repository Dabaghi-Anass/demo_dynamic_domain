version: '3.8'

services:
  fallback-app:
    image: nginx:alpine
    container_name: custom-fallback-service
    volumes:
      - ./404.html:/usr/share/nginx/html/404.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - coolify
    deploy:
      resources:
        reservations:
          cpus: '0.1'
          memory: 50M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fallback-app.rule=Host(`fallback.switchfy.ma`)"
      - "traefik.http.routers.fallback-app.entrypoints=websecure"
      - "traefik.http.routers.fallback-app.tls=true"
      - "traefik.http.routers.fallback-app.tls.certresolver=letsencrypt"
      # FORCE LE PORT INTERNE 80 ICI
      - "traefik.http.services.fallback-app.loadbalancer.server.port=80"

networks:
  coolify:
    external: true
