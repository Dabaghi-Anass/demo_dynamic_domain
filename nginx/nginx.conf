upstream fallback_backend {
    server fallback.switchfy.ma;
}

server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.switchfy\.ma$;

    location / {
        proxy_pass http://fallback.switchfy.ma/$subdomain$request_uri;

        proxy_set_header Host            fallback.switchfy.ma;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}